name: Deploy Hugo site to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
      # Proxy-only (no ,direct): force zip downloads from the module proxy and
      # never fall back to git. The legacy protoc-gen-doc dep chain
      # (grpc/genproto/protobuf pseudo-versions) flakes on `git fetch --unshallow`
      # otherwise ("shallow file has changed"). The proxy serves all of them.
      GOPROXY: https://proxy.golang.org
    steps:
      - name: Install Hugo CLI
        run: |
          wget -q -O "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Cache Hugo modules
        uses: actions/cache@v5
        with:
          path: /tmp/hugo_cache
          key: hugo-modules-v2-${{ hashFiles('go.sum') }}
          restore-keys: hugo-modules-v2-

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: /tmp/hugo_cache
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
