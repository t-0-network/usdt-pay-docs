name: Generate Docs

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "proto/**"
      - "content/docs/**"

jobs:
  generate:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      # Same gopkg.in direct-git fragility as the Hugo deploy: route module
      # fetches through the reliable public proxy.
      GOPROXY: https://proxy.golang.org,direct
    steps:
      - name: Generate GitHub APP Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: usdt-pay-docs

      - name: Checkout
        uses: actions/checkout@v7
        with:
          show-progress: false
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}

      - name: Install protoc
        run: |
          PROTOC_TAG=$(curl -sS https://api.github.com/repos/protocolbuffers/protobuf/releases/latest | jq -r .tag_name)
          PROTOC_VER=${PROTOC_TAG#v}
          curl -sSL "https://github.com/protocolbuffers/protobuf/releases/download/${PROTOC_TAG}/protoc-${PROTOC_VER}-linux-x86_64.zip" -o /tmp/protoc.zip
          sudo unzip -o /tmp/protoc.zip bin/protoc 'include/*' -d /usr/local

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install protoc-gen-doc
        run: go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc

      - name: Generate Docs
        run: ./_gen/gen.sh

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto-generate docs"
          file_pattern: "content/docs/**"
