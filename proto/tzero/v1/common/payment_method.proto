    // Payment reference/description (optional).
    optional string payment_reference = 40 [(buf.validate.field).string = {
      max_len: 140
    }];

    message Proxy {
      // KOLAS proxy type - determines the format of value.
      ProxyType proxy_type = 10 [(buf.validate.field).enum = {
        defined_only: true,
        not_in: [0]
