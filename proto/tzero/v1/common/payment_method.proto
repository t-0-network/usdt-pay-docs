  // FAST - Turkish instant payment system. Addressed by IBAN or a KOLAS proxy.
  message Fast {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_FAST;

    oneof destination {
      option (buf.validate.oneof).required = true;

