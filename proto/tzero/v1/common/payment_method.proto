syntax = "proto3";

package tzero.v1.common;

import "buf/validate/validate.proto";
import "google/protobuf/descriptor.proto";

enum PaymentMethodType {
  PAYMENT_METHOD_TYPE_UNSPECIFIED = 0;
  PAYMENT_METHOD_TYPE_SEPA = 10;
  PAYMENT_METHOD_TYPE_SWIFT = 20;
  PAYMENT_METHOD_TYPE_ACH = 50;
  PAYMENT_METHOD_TYPE_DOMESTIC_WIRE = 60;
  PAYMENT_METHOD_TYPE_FPS = 70;

  PAYMENT_METHOD_TYPE_M_PESA = 80 [deprecated = true]; // deprecated in favor of PAYMENT_METHOD_TYPE_AFRICAN_MOBILE_MONEY
  PAYMENT_METHOD_TYPE_G_CASH = 90;
  PAYMENT_METHOD_TYPE_INDIAN_BANK_TRANSFER = 100;
  PAYMENT_METHOD_TYPE_PESONET = 110;
  PAYMENT_METHOD_TYPE_INSTAPAY = 120;
  // Pakistan domestic bank transfer via IBAN
  PAYMENT_METHOD_TYPE_PAKISTAN_BANK_TRANSFER = 130;
  // Pakistan mobile wallet (JazzCash, Easypaisa, etc.) - sometimes also called ID Wallet
  PAYMENT_METHOD_TYPE_PAKISTAN_MOBILE_WALLET = 140;
  // PIX - Brazilian instant payment system
  PAYMENT_METHOD_TYPE_PIX = 150;
  // African Mobile Money  - Mobile money system across multiple countries: Kenya (Mpesa, Airtel), Tanzania, Mozambique, DRC, Lesotho, Ghana, Egypt, South Africa etc.
  PAYMENT_METHOD_TYPE_AFRICAN_MOBILE_MONEY = 160;
  // The China National Advanced Payment System
  PAYMENT_METHOD_TYPE_CNAPS = 170;
  // NIP - Nigeria Instant Payment system
  PAYMENT_METHOD_TYPE_NIP = 180;
  // RTP - Real-Time Payments (USA)
  PAYMENT_METHOD_TYPE_RTP = 190;
  // Chilean domestic bank transfer (CLP)
  PAYMENT_METHOD_TYPE_CHILEAN_BANK_TRANSFER = 200;
  // Peruvian domestic bank transfer (PEN, USD-PE)
  PAYMENT_METHOD_TYPE_PERU_BANK_TRANSFER = 210;
  // Argentinian domestic bank transfer via CBU/CVU (ARS)
  PAYMENT_METHOD_TYPE_ARGENTINIAN_BANK_TRANSFER = 220;
  // Mexican domestic bank transfer via SPEI/CLABE (MXN)
  PAYMENT_METHOD_TYPE_MEXICAN_BANK_TRANSFER = 230;
  // Colombian ACH bank transfer (COP)
  PAYMENT_METHOD_TYPE_COLOMBIAN_ACH = 240;
  // Colombian Bre-B high-speed payment rail (COP)
  PAYMENT_METHOD_TYPE_COLOMBIAN_BREB = 250;
  // GIP - Ghana Interbank Payment (GhIPSS)
  PAYMENT_METHOD_TYPE_GIP = 260;
  // UAEFTS - UAE Funds Transfer System (United Arab Emirates)
  PAYMENT_METHOD_TYPE_UAEFTS = 270;
  // VietQR - Vietnamese QR-addressed bank transfer
  PAYMENT_METHOD_TYPE_VIETQR = 280;
  // NAPAS 247 - Vietnamese instant transfer by account or card
  PAYMENT_METHOD_TYPE_NAPAS = 290;
  // FAST - Turkish instant payment system (Turkey)
  PAYMENT_METHOD_TYPE_FAST = 300;
  // PromptPay - Thai proxy-addressed instant transfer (Thailand)
  PAYMENT_METHOD_TYPE_PROMPTPAY = 310;
  // Thai domestic bank transfer - ORFT/BAHTNET (Thailand)
  PAYMENT_METHOD_TYPE_THAI_BANK_TRANSFER = 320;
  // Indonesian domestic bank transfer - BI-FAST and other rails (Indonesia)
  PAYMENT_METHOD_TYPE_INDONESIAN_BANK_TRANSFER = 330;
  // Indonesian e-wallet - GoPay, OVO, DANA, ShopeePay, LinkAja, etc. (Indonesia)
  PAYMENT_METHOD_TYPE_INDONESIAN_E_WALLET = 340;
}

message PaymentDetails {
  oneof details {
    option (buf.validate.oneof).required = true;
    // SEPA (Single Euro Payments Area) - Euro bank transfers across European countries
    Sepa sepa = 10;

    //SWIFT (Society for Worldwide Interbank Financial Telecommunication) - International wire transfers
    // Global (200+ countries)
    Swift swift = 30;


    // ACH (Automated Clearing House) - Electronic bank-to-bank transfers
    // United States
    Ach ach = 50;

    // DomesticWire - US domestic wire transfer
    // United States
    DomesticWire domestic_wire = 60;

    // FPS (Faster Payments Service)
    // United Kingdom
    Fps fps = 70;

    // M-Pesa - Mobile money transfer and payment service
    // Kenya, Tanzania, Mozambique, DRC, Lesotho, Ghana, Egypt, South Africa
    MPesa mpesa = 80 [deprecated = true]; // deprecated in favor of AfricanMobileMoney

    // GCash - Mobile wallet and payment platform
    // Philippines
    GCash gcash = 90;

    // Indian Bank Transfer - Domestic electronic funds transfer (IMPS/NEFT/RTGS)
    // India
    IndianBankTransfer  indian_bank_transfer = 100;

    // PESONet - Real-time domestic payments system
    // Philippines
    Pesonet pesonet = 110;

    // Instapay - Real-time domestic payments system
    // Philippines
    Instapay instapay = 120;

    // Pakistan Bank Transfer - Domestic bank transfers using Pakistani IBAN
    // Pakistan
    PakistanBankTransfer pakistan_bank_transfer = 130;

    // Pakistan Mobile Wallet - JazzCash, Easypaisa, SadaPay, NayaPay and other wallets
    // Pakistan
    PakistanMobileWallet pakistan_mobile_wallet = 140;

    // PIX - Brazilian instant payment system
    // Brazil
    Pix pix = 150;

    // African Money - Kenya payment method
    AfricanMobileMoney african_mobile_money = 160;

    // The China National Advanced Payment System
    Cnaps naps = 170;

    // NIP - Nigeria Instant Payment system
    // Nigeria
    Nip nip = 180;

    // RTP - Real-Time Payments
    // United States
    Rtp rtp = 190;

    // Chilean domestic bank transfer
    // Chile
    ChileanBankTransfer chilean_bank_transfer = 200;

    // Peruvian domestic bank transfer
    // Peru
    PeruBankTransfer peru_bank_transfer = 210;

    // Argentinian domestic bank transfer via CBU/CVU
    // Argentina
    ArgentinianBankTransfer argentinian_bank_transfer = 220;

    // Mexican domestic bank transfer via SPEI/CLABE
    // Mexico
    MexicanBankTransfer mexican_bank_transfer = 230;

    // Colombian ACH bank transfer
    // Colombia
    ColombianAch colombian_ach = 240;

    // Colombian Bre-B high-speed payment rail
    // Colombia
    ColombianBreb colombian_breb = 250;

    // GIP - Ghana Interbank Payment (GhIPSS)
    // Ghana
    Gip gip = 260;

    // UAEFTS - UAE Funds Transfer System
    // United Arab Emirates
    Uaefts uaefts = 270;

    // VietQR - QR-addressed bank transfer
    // Vietnam
    VietQr vietqr = 280;

    // NAPAS 247 - instant transfer by account or card
    // Vietnam
    Napas napas = 290;

    // FAST - instant payment via IBAN or KOLAS proxy
    // Turkey
    Fast fast = 300;

    // PromptPay - proxy-addressed instant transfer
    // Thailand
    PromptPay promptpay = 310;

    // Thai domestic bank transfer (ORFT/BAHTNET)
    // Thailand
    ThaiBankTransfer thai_bank_transfer = 320;

    // Indonesian domestic bank transfer (BI-FAST and other rails)
    // Indonesia
    IndonesianBankTransfer indonesian_bank_transfer = 330;

    // Indonesian e-wallet
    // Indonesia
    IndonesianEWallet indonesian_e_wallet = 340;
  };

  message Sepa {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_SEPA;

    string iban = 20 [(buf.validate.field).string = {
      min_len: 15,
      max_len: 34,
      pattern: "^[A-Z]{2}[0-9]{2}[A-Z0-9]+$"
    }];
    string beneficiary_name = 30 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 70
    }];
    string payment_reference = 40 [(buf.validate.field).string = {
      max_len: 140
    }];
  }

  message Fps {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_FPS;

    string sort_code = 10 [(buf.validate.field).string = {
      min_len: 6,
      max_len: 8,
      pattern: "^([0-9]{2}-[0-9]{2}-[0-9]{2}|[0-9]{6})$"
    }];
    string account_number = 20 [(buf.validate.field).string = {
      min_len: 8,
      max_len: 8,
      pattern: "^[0-9]{8}$"
    }];
    string beneficiary_name = 30 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 18
    }];
    string reference = 40 [(buf.validate.field).string = {
      max_len: 18
    }];
  }

  message MPesa {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_M_PESA;

    // Phone number in international format without + sign
    // Examples: 254708374149 (Kenya), 255712345678 (Tanzania), 256712345678 (Uganda)
    // Required: Yes
    string beneficiary_phone = 10 [(buf.validate.field).string = {
      min_len: 10,
      max_len: 15,
      pattern: "^[0-9]{10,15}$"
    }];

    // Account reference (max 12 chars, alphanumeric)
    // Required: Yes
    string account_reference = 20 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 12,
      pattern: "^[a-zA-Z0-9]+$"
    }];

    // Beneficiary name
    string beneficiary_name = 30 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 100
    }];
  }

  message AfricanMobileMoney {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_AFRICAN_MOBILE_MONEY;

    // The phone network
    Network network = 5 [(buf.validate.field).required = true];

    // Phone number in international format without + sign
    // Required: Yes
    string beneficiary_phone = 10 [(buf.validate.field).string = {
      min_len: 10,
      max_len: 15,
      pattern: "^[0-9]{10,15}$"
    }];

    // Account reference (max 12 chars, alphanumeric)
    // Required: Yes
    string account_reference = 20 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 12,
      pattern: "^[a-zA-Z0-9]+$"
    }];

    // Beneficiary name
    string beneficiary_name = 30 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 100
    }];

    enum Network {
      NETWORK_UNDEFINED = 0;
      NETWORK_M_PESA = 10;
      NETWORK_AIRTEL = 20;
      NETWORK_MTN = 30;
      NETWORK_VODACOM = 40;
      NETWORK_ORANGE = 50;
      NETWORK_VODAFONE = 60;
      NETWORK_FREE = 70;
      NETWORK_ZAMTEL = 80;
    }
    /*
    Countries and Available Networks
     • CD (DRC): VODACOM, AIRTEL, ORANGE
     • CI (Côte d'Ivoire): ORANGE, MTN
     • CM (Cameroon): MTN, ORANGE
     • GH (Ghana): MTN, VODAFONE, AIRTEL
     • KE (Kenya): MPESA, AIRTEL
     • MW (Malawi): AIRTEL
     • RW (Rwanda): MTN, AIRTEL
     • SN (Senegal): ORANGE, FREE
     • TZ (Tanzania): VODACOM, AIRTEL
     • UG (Uganda): MTN, AIRTEL,ORANGE
     • ZA (South Africa): VODACOM, MTN
     • ZM (Zambia): MTN, AIRTEL, ZAMTEL
     */
  }

  message GCash {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_G_CASH;

    string beneficiary_name = 10 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 100
    }];

    // Recipient phone
    string beneficiary_phone = 20 [(buf.validate.field).string = {
      min_len: 10,
      max_len: 20,
      pattern: "^[+]?[0-9]+$"
    }];

    string payment_reference = 30 [(buf.validate.field).string = {
      max_len: 140,
    }];

  }

  message IndianBankTransfer {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_INDIAN_BANK_TRANSFER;

    oneof method {
      option (buf.validate.oneof).required = true;

      // 1) ACCOUNT + IFSC (NEFT/RTGS/IMPS P2A)
      AccountIFSC account_ifsc = 10;

      // 2) IMPS P2P (MOBILE + MMID)
      IMPS imps = 20;
    }

    message AccountIFSC {
      // Beneficiary bank account number
      string account_number = 10 [(buf.validate.field).string = {
        min_len: 9,
        max_len: 18,
        pattern: "^[0-9]{9,18}$"
      }];

      // IFSC code (11 characters: 4 letters + '0' + 6 alphanumeric).
      string ifsc = 20 [(buf.validate.field).string = {
        min_len: 11,
        max_len: 11,
        pattern: "^[A-Z]{4}0[A-Z0-9]{6}$"
      }];
    }

    //Method 2: IMPS P2P (Mobile + MMID)
    message IMPS {
      // Indian mobile number (10 digits, starting from 6–9).
      string beneficiary_phone = 10 [(buf.validate.field).string = {
        pattern: "^[6-9][0-9]{9}$",
        min_len: 10,
        max_len: 10
      }];

      // MMID: 7-digit Mobile Money Identifier.
      string mmid = 20 [(buf.validate.field).string = {
        pattern: "^[0-9]{7}$",
        min_len: 7,
        max_len: 7
      }];
    }

    // Beneficiary name
    string beneficiary_name = 30 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 70
    }];

    // Whether the beneficiary is an individual or a company.
    // INR payout rails always require the distinction.
    BeneficiaryType beneficiary_type = 40 [(buf.validate.field).enum = {
      defined_only: true,
      not_in: [0]
    }];

    string payment_reference = 50 [(buf.validate.field).string = {
      max_len: 140,
    }];

    enum BeneficiaryType {
      BENEFICIARY_TYPE_UNSPECIFIED = 0;
      // Natural person.
      BENEFICIARY_TYPE_INDIVIDUAL = 10;
      // Business entity.
      BENEFICIARY_TYPE_COMPANY = 20;
    }
  }

  message Swift {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_SWIFT;

    // Beneficiary's bank SWIFT/BIC code (8 or 11 characters)
    string swift_code = 10 [(buf.validate.field).string = {
      min_len: 8,
      max_len: 11,
      pattern: "^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$"
    }];

    // Beneficiary's account number (format varies by country)
    // Could be IBAN, account number, or other format
    string account_number = 20 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 34
    }];

    // Beneficiary's full name
    string beneficiary_name = 30 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 140
    }];

    // Beneficiary's address
    string beneficiary_address = 40 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 255
    }];

    string payment_reference = 50 [(buf.validate.field).string = {
      max_len: 140
    }];

    // Beneficiary's bank name
    string bank_name = 60 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 140
    }];

    // Beneficiary's bank country (ISO 3166-1 alpha-2)
    string bank_country = 70 [(buf.validate.field).string = {
      len: 2,
      pattern: "^[A-Z]{2}$"
    }];

    // Account currency (ISO 4217)
    optional string account_currency = 80 [(buf.validate.field).string = {
      len: 3,
      pattern: "^[A-Z]{3}$"
    }];

    IntermediaryBank intermediary_bank = 90;

    // Intermediary bank details (optional)
    message IntermediaryBank {
      string swift_code = 1 [(buf.validate.field).string = {
        min_len: 8,
        max_len: 11,
        pattern: "^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$"
      }];

      string bank_name = 2 [(buf.validate.field).string = {
        min_len: 1,
        max_len: 140
      }];

      string account_number = 3 [(buf.validate.field).string = {
        max_len: 34
      }];
    }
  }

  message Ach {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_ACH;

    string routing_number = 10 [(buf.validate.field).string = {
      min_len: 9,
      max_len: 9,
      pattern: "^[0-9]{9}$"
    }];

    string account_number = 20 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 17,
      pattern: "^[0-9]+$"
    }];

    string account_holder_name = 30 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 70
    }];

    AchAccountType account_type = 40 [(buf.validate.field).enum = {
      not_in: [0]
    }];

    // Payment reference/description (optional)
    string payment_reference = 50 [(buf.validate.field).string = {
      max_len: 140
    }];

    enum AchAccountType {
      ACH_ACCOUNT_TYPE_UNSPECIFIED = 0;
      ACH_ACCOUNT_TYPE_CHECKING = 10;
      ACH_ACCOUNT_TYPE_SAVINGS = 20;
    }
  }

  message DomesticWire {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_DOMESTIC_WIRE;

    string bank_name = 10 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 70
    }];

    string bank_address = 20 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 140
    }];

    // ABA routing number (9 digits)
    string routing_number = 30 [(buf.validate.field).string = {
      min_len: 9,
      max_len: 9,
      pattern: "^[0-9]{9}$"
    }];

    string account_number = 40 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 34
    }];

    string beneficiary_name = 50 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 70
    }];

    string beneficiary_address = 60 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 140
    }];

    string wire_reference = 70 [(buf.validate.field).string = {
      max_len: 140
    }];
  }

  message Pesonet {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_PESONET;

    //Recipient institution: receiving bank or participating non‑bank chosen from a PESONet list.
    string recipient_financial_institution = 10 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 70
    }];

    //Recipient identifier:
    //Account number (some banks also allow email/mobile).
    string recipient_identifier = 20 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 70
    }];

    string recipient_account_name = 30 [(buf.validate.field).string = {
      max_len: 18
    }];

    // Purpose of Transfer (Optional/Mandatory depending on bank)
    optional string purpose_of_transfer = 40 [(buf.validate.field).string = {
      max_len: 140
    }];

    // Recipient's Address/Email (Optional/Mandatory depending on bank)
    optional string recipient_address_email = 50 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 512
    }];
  }

  message Instapay {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_INSTAPAY;

    //Recipient institution: receiving bank or e‑money issuer selected from an InstaPay list.
    string recipient_institution = 10 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 70
    }];
    //Recipient identifier (one of): Account number, or Mobile number, or Email address, or QR code (scanned/uploaded “InstaPay QR”).
    string recipient_identifier = 20 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 70
    }];
    //Recipient account name: the name as registered on the account or wallet (may be auto-displayed but is logically required for correct routing/confirmation).
    string recipient_account_name = 30 [(buf.validate.field).string = {
      max_len: 50
    }];

    //Purpose of Transfer (Optional/Mandatory depending on bank)
    optional string purpose_of_transfer = 40 [(buf.validate.field).string = {
      max_len: 140
    }];
  }

  // Pakistan Bank Transfer - Domestic transfers using Pakistani IBAN
  // Pakistan uses 24-character IBAN: PK + 2 check digits + 4-char bank code + 16-char account number
  message PakistanBankTransfer {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_PAKISTAN_BANK_TRANSFER;

    // Pakistani IBAN (24 characters: PK + 2 check digits + 4-char bank identifier + 16-char account)
    // Example: PK36SCBL0000001123456702
    string iban = 10 [(buf.validate.field).string = {
      min_len: 24,
      max_len: 24,
      pattern: "^PK[0-9]{2}[A-Z]{4}[0-9]{16}$"
    }];

    // Beneficiary's full name
    string beneficiary_name = 20 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 140
    }];

    // (Optional) Beneficiary CNIC (13 digits, no dashes) — sometimes required by receiving banks
    optional string beneficiary_cnic = 25 [(buf.validate.field).string = {
      min_len: 13,
      max_len: 13,
      pattern: "^[0-9]{13}$"
    }];

    // Payment reference/description
    string payment_reference = 30 [(buf.validate.field).string = {
      max_len: 140
    }];
  }

  // Pakistan Mobile Wallet - JazzCash, Easypaisa, SadaPay, NayaPay and other wallets
  // Transfers are made using the mobile number linked to the wallet account; CNIC is required for verification
  message PakistanMobileWallet {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_PAKISTAN_MOBILE_WALLET;

    // Wallet provider
    PakistanWalletProvider wallet_provider = 10 [(buf.validate.field).enum = {not_in: [0]}];

    // Mobile number linked to the wallet (Pak local 03XXXXXXXXX or international 923XXXXXXXXX)
    string mobile_number = 20 [(buf.validate.field).string = {
      min_len: 11,
      max_len: 12,
      pattern: "^(03[0-9]{9}|923[0-9]{9})$"
    }];

    // CNIC (Computerized National Identity Card) - 13 digits without dashes
    string cnic = 30 [(buf.validate.field).string = {
      min_len: 13,
      max_len: 13,
      pattern: "^[0-9]{13}$"
    }];

    // Beneficiary's full name as registered with the wallet
    string beneficiary_name = 40 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 140
    }];

    // Payment reference/description (optional)
    optional string payment_reference = 50 [(buf.validate.field).string = {
      max_len: 140
    }];

    enum PakistanWalletProvider {
      PAKISTAN_WALLET_PROVIDER_UNSPECIFIED = 0;
      PAKISTAN_WALLET_PROVIDER_JAZZCASH = 10;
      PAKISTAN_WALLET_PROVIDER_EASYPAISA = 20;
      PAKISTAN_WALLET_PROVIDER_SADAPAY = 30;
      PAKISTAN_WALLET_PROVIDER_NAYAPAY = 40;
      PAKISTAN_WALLET_PROVIDER_OTHER = 100;
    }
  }

  // PIX - Brazilian instant payment system
  // PIX allows transfers using a Pix key (CPF, CNPJ, email, phone, or random EVP)
  // or traditional bank account details (bank code, branch, account number)
  message Pix {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_PIX;

    // Pix key type - determines the format of pix_key_value
    KeyType key_type = 10 [(buf.validate.field).enum = {not_in: [0]}];

    // Pix key value - format depends on pix_key_type:
    // - CPF: 11 digits (e.g., "12345678901")
    // - CNPJ: 14 digits (e.g., "12345678000195")
    // - EMAIL: valid email address
    // - PHONE: international format with country code (e.g., "+5511999999999")
    // - EVP: 32-character UUID (e.g., "123e4567-e89b-12d3-a456-426614174000")
    string key_value = 20 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 77
    }];

    // Beneficiary's full name
    string beneficiary_name = 30 [(buf.validate.field).string = {
      min_len: 1,
      max_len: 140
    }];

    // (Optional) Beneficiary's CPF (11 digits) or CNPJ (14 digits) for verification
    optional string beneficiary_tax_id = 40 [(buf.validate.field).string = {
      min_len: 11,
      max_len: 14,
      pattern: "^[0-9]{11,14}$"
    }];

    // (Optional) Payment description/reference
    optional string payment_reference = 50 [(buf.validate.field).string = {
      max_len: 140
    }];

    enum KeyType {
      KEY_TYPE_UNSPECIFIED = 0;
      // CPF - Cadastro de Pessoas Físicas (Individual Taxpayer Registry) - 11 digits
      KEY_TYPE_CPF = 10;
      // CNPJ - Cadastro Nacional da Pessoa Jurídica (Business Tax ID) - 14 digits
      KEY_TYPE_CNPJ = 20;
      // Email address
      KEY_TYPE_EMAIL = 30;
      // Phone number in international format
      KEY_TYPE_PHONE = 40;
      // EVP - Random key (UUID format)
      KEY_TYPE_EVP = 50;
    }
  }

  // The China National Advanced Payment System
  message Cnaps {
    option (payment_method_type) = PAYMENT_METHOD_TYPE_CNAPS;

    // 6-25 digits
    string account_number = 10 [(buf.validate.field).string = {
      min_len: 6,
      max_len: 25,
      pattern: "^[0-9]{6,25}$"
    }];

    // 12 digits (encodes the bank + branch)
    string cnaps_code = 20 [(buf.validate.field).string = {
      min_len: 12,
      max_len: 12,
