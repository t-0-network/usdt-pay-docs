syntax = "proto3";

// MODELING DRAFT — not yet wired into any buf module.
// Eventual home: proto/tzero/v1/pay/types.proto (new independent `pay` service).

package tzero.v1.pay;

import "buf/validate/validate.proto";

/**
 * On-chain network a USDt leg moves over. Local to the pay contract.
 * Launch-live: TRON, ETH, BSC. Six more (Polygon, Arbitrum, Optimism, Base,
 * Avalanche, Solana) are announced as upcoming and added here as they go live.
 * Wire names are the full chain names; these enum labels are the internal mapping.
 */
enum Blockchain {
  BLOCKCHAIN_UNSPECIFIED = 0;
  BLOCKCHAIN_TRON = 10;
  BLOCKCHAIN_ETH = 20;
  BLOCKCHAIN_BSC = 30;
}

/**
 * One on-chain USDt transfer made by the customer. The only payment-method
 * variant in the MVP.
 */
message UsdtOnChainPayment {
  /** Chain the customer's USDt transfer moved over. */
  Blockchain chain = 10 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  /** Hash of the customer's USDt transfer. */
  string on_chain_tx_hash = 20 [(buf.validate.field).string = {min_len: 1}];

  /** Customer's source wallet address, for receipt and audit. */
  string sender_address = 30 [(buf.validate.field).string = {min_len: 1}];
}

/**
 * One selectable QR payment option for an intent — the renderable payload is
 * chain-native and encoded by the POS without modification.
 */
message QrOption {
  /** Chain this deposit option pays on. */
  Blockchain chain = 10 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  /** One-time deposit address reserved for this intent on `chain`. */
  string deposit_address = 20 [(buf.validate.field).string = {min_len: 1}];

  /** Chain-native URI (e.g. ERC-681 on EVM) the POS encodes as a QR image as-is. */
  string renderable_payload = 30 [(buf.validate.field).string = {min_len: 1}];
}

/**
 * USDt-on-chain settlement payload, shared by the issuer's SettlementSent and
 * the acquirer's SettlementCompleted usdt variant.
 */
message OnChainSettlementDetails {
  /** Hash of the settlement transaction. */
  string on_chain_tx_hash = 10 [(buf.validate.field).string = {min_len: 1}];

  /** Chain the settlement moved over. */
  Blockchain chain = 20 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  /** Registered settlement wallet on `chain` — the Acquirer's (USDt mode) or the LP's (fiat mode). */
  string destination_address = 30 [(buf.validate.field).string = {min_len: 1}];
}
