syntax = "proto3";

// MODELING DRAFT — not yet wired into any buf module.
// Eventual home: proto/tzero/v1/pay/issuer.proto. The Issuer ↔ t-0 edge:
// IssuerService is hosted by t-0 and called by the Issuer;
// IssuerCallbackService is implemented by the Issuer and called by t-0.

package tzero.v1.pay;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "tzero/v1/common/common.proto";
import "tzero/v1/pay/types.proto";

/**
 * t-0 endpoints the Issuer calls to report on-chain recognition, settlement,
 * and reservation expiry.
 */
service IssuerService {
  /** Reports the customer's payment seen on-chain and KYT-cleared; the Issuer now owns on-chain risk. */
  rpc PaymentReceived(PaymentReceivedRequest) returns (PaymentReceivedResponse) {
    option idempotency_level = IDEMPOTENT;
  }

  /** Reports a USDt settlement sent on-chain to the registered destination, for t-0 to verify. */
  rpc SettlementSent(SettlementSentRequest) returns (SettlementSentResponse) {
    option idempotency_level = IDEMPOTENT;
  }

  /** Confirms the reservation closed with no valid payment and the deposit addresses are released. */
  rpc PaymentExpired(IssuerPaymentExpiredRequest) returns (IssuerPaymentExpiredResponse) {
    option idempotency_level = IDEMPOTENT;
  }
}

/**
 * Issuer-implemented endpoint t-0 calls to reserve deposit addresses and obtain
 * the renderable QR payloads for an intent.
 */
service IssuerCallbackService {
  /** Reserves one deposit address per supported chain and returns the renderable QR payloads. */
  rpc CreatePaymentInstructions(CreatePaymentInstructionsRequest) returns (CreatePaymentInstructionsResponse) {
    option idempotency_level = IDEMPOTENT;
  }
}

// ── IssuerService ────────────────────────────────────────────────────

message PaymentReceivedRequest {
  uint64 payment_intent_id = 10 [(buf.validate.field).uint64.gt = 0];

  // Amount credited; must equal the intent's stored amount_usdt exactly.
  tzero.v1.common.Decimal amount_usdt = 20 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      message: "amount_usdt must be greater than zero"
      expression: "this.unscaled > 0"
    }
  ];

  // The payment instrument; the MVP's only variant is usdt_on_chain.
  oneof payment_method {
    option (buf.validate.oneof).required = true;
    UsdtOnChainPayment usdt_on_chain = 30;
  }

  // Moment the Issuer treated the payment as final.
  google.protobuf.Timestamp received_at = 40 [(buf.validate.field).required = true];
}

message PaymentReceivedResponse {
  oneof result {
    option (buf.validate.oneof).required = true;
    Accepted accepted = 10;
    Rejected rejected = 20;
  }

  message Accepted {}

  message Rejected {
    Reason reason = 10 [(buf.validate.field).enum.not_in = 0];

    enum Reason {
      REASON_UNSPECIFIED = 0;
      // Received after expires_at on t-0's clock.
      REASON_INTENT_EXPIRED = 10;
      // No such intent exists.
      REASON_UNKNOWN_INTENT = 20;
      // amount_usdt is not exactly the intent's stored amount.
      REASON_AMOUNT_MISMATCH = 30;
    }
  }
}

message SettlementSentRequest {
  // Issuer's id for this USDt settlement; idempotency key, unique per Issuer.
  string settlement_ref = 10 [(buf.validate.field).string = {min_len: 1}];

  tzero.v1.common.Decimal amount_usdt = 20 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      message: "amount_usdt must be greater than zero"
      expression: "this.unscaled > 0"
    }
  ];

  // On-chain transaction, chain, and registered destination wallet for this settlement.
  OnChainSettlementDetails settlement = 30 [(buf.validate.field).required = true];

  // Intents this settlement clears; per-intent amounts are read from t-0's ledger.
  repeated uint64 settled_payment_intent_ids = 40 [(buf.validate.field).repeated = {min_items: 1}];

  google.protobuf.Timestamp settled_at = 50 [(buf.validate.field).required = true];
}

message SettlementSentResponse {
  oneof result {
    option (buf.validate.oneof).required = true;
    Accepted accepted = 10;
    Rejected rejected = 20;
  }

  message Accepted {}

  message Rejected {
    Reason reason = 10 [(buf.validate.field).enum.not_in = 0];

    // Intents that failed verification within the batch.
    repeated uint64 failing_intent_ids = 20;

    enum Reason {
      REASON_UNSPECIFIED = 0;
      // The on-chain transaction is not yet confirmed.
      REASON_ON_CHAIN_UNCONFIRMED = 10;
      // The confirmed amount does not equal amount_usdt or the covered intents' sum.
      REASON_AMOUNT_MISMATCH = 20;
      // destination_address (or its chain) is not the expected registered (chain, address) pair for the mode.
      REASON_WRONG_DESTINATION = 30;
      // A listed intent is not in a settleable state (USDt mode: SETTLEMENT_PENDING; fiat mode: authorized).
      REASON_INTENT_NOT_SETTLEABLE = 40;
    }
  }
}

// `PaymentExpired` is also a method on AcquirerCallbackService in this flat
// package, so the request/response carry a role prefix to avoid a colliding
// `PaymentExpiredRequest`. Interim name: buf STANDARD RPC_REQUEST_STANDARD_NAME
// accepts only bare `PaymentExpiredRequest` or the full
// `IssuerServicePaymentExpiredRequest`, so this short form needs a lint
// ignore at graduation (or rename the method).
message IssuerPaymentExpiredRequest {
  uint64 payment_intent_id = 10 [(buf.validate.field).uint64.gt = 0];

  // Moment the Issuer released the deposit addresses.
  google.protobuf.Timestamp expired_at = 20 [(buf.validate.field).required = true];
}

message IssuerPaymentExpiredResponse {
  oneof result {
    option (buf.validate.oneof).required = true;
    Accepted accepted = 10;
    Rejected rejected = 20;
  }

  message Accepted {}

  message Rejected {
    Reason reason = 10 [(buf.validate.field).enum.not_in = 0];

    enum Reason {
      REASON_UNSPECIFIED = 0;
      // payment_intent_id is one t-0 never opened.
      REASON_UNKNOWN_INTENT = 10;
    }
  }
}

// ── IssuerCallbackService ───────────────────────────────────────────────────

message CreatePaymentInstructionsRequest {
  uint64 payment_intent_id = 10 [(buf.validate.field).uint64.gt = 0];

  // t-0's stable id for the Acquirer; the Issuer resolves its settlement wallet from it.
  uint64 acquirer_id = 20 [(buf.validate.field).uint64.gt = 0];

  // Amount the reserved addresses should accept.
  tzero.v1.common.Decimal amount_usdt = 30 [
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      message: "amount_usdt must be greater than zero"
      expression: "this.unscaled > 0"
    }
  ];

  // Absolute moment t-0 requires the reservation held until, on t-0's clock
  // (t-0 sets a 60–120 second window in the MVP).
  google.protobuf.Timestamp expires_at = 40 [(buf.validate.field).timestamp.gt_now = true];
}

message CreatePaymentInstructionsResponse {
  oneof result {
    option (buf.validate.oneof).required = true;
    Success success = 10;
    Failure failure = 20;
  }

  message Success {
    // One option per chain the Issuer supports for this intent.
    repeated QrOption qr_options = 10 [(buf.validate.field).repeated = {min_items: 1}];

    // Absolute expiry of the reservation.
    google.protobuf.Timestamp expires_at = 20 [(buf.validate.field).required = true];
  }

  message Failure {
    Reason reason = 10 [(buf.validate.field).enum.not_in = 0];

    enum Reason {
      REASON_UNSPECIFIED = 0;
      // The Issuer is unavailable to allocate.
      REASON_ISSUER_UNAVAILABLE = 10;
      // No free one-time deposit addresses.
      REASON_ADDRESS_POOL_EMPTY = 20;
      // The amount falls outside the acceptable range.
      REASON_AMOUNT_OUT_OF_RANGE = 40;
    }
  }
}
