<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #15803D;
      color: #fff;
      overflow-x: hidden;
    }

    /* Hero container */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background: #15803D;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Map containers */
    .hero-inner {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .map-side {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 78vh;
      aspect-ratio: 2;
      pointer-events: none;
      color: rgba(255,255,255,0.2);
    }
    .map-left { right: 70%; }
    .map-right { left: 70%; }
    .map-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Center content */
    .hero-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10rem 2rem;
      max-width: 48rem;
    }
    .hero-title {
      font-family: 'Figtree', system-ui, sans-serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      white-space: nowrap;
      animation: fadeZoomIn 1.5s ease-out both;
    }
    .hero-subtitle {
      margin-top: 0.75rem;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.6;
      max-width: 36rem;
      text-wrap: balance;
      opacity: 0;
      animation: slideIn 2s ease-out 0.4s both;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding: 0.5rem 1.25rem;
      background: #fff;
      color: #166543;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 9999px;
      text-decoration: none;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.2), 0 4px 12px rgba(0,0,0,0.15);
      transition: all 0.2s;
      opacity: 0;
      animation: slideUp 1.5s ease-out 0.5s both;
    }
    .hero-cta:hover {
      background: #f0fdf4;
      box-shadow: 0 0 0 6px rgba(255,255,255,0.3), 0 4px 16px rgba(0,0,0,0.2);
    }
    .hero-cta svg {
      width: 1.2em;
      height: 1.2em;
    }

    /* Backed by */
    .backed-by {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      opacity: 0.75;
      animation: slideUp 1.2s ease-out 0.7s both;
    }
    .backed-by p {
      font-size: 0.875rem;
    }
    .backed-by svg {
      width: 6rem;
      fill: currentColor;
    }

    /* Animations */
    @keyframes fadeZoomIn {
      from { opacity: 0; transform: scale(1.05); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-0.5rem); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(1.5rem); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Tablet */
    @media (max-width: 1200px) {
      .map-left { right: 60%; }
      .map-right { left: 60%; }
      .map-side path[stroke],
      .map-side use { opacity: 0.4; }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .hero-content { padding: 8rem 1.5rem 4rem; }
      .hero-title { font-size: 2.5rem; white-space: normal; }
      .map-left { right: 55%; }
      .map-right { left: 55%; }
      .map-side path[stroke],
      .map-side use { opacity: 0.15; }
    }

    /* Pulse dot — CSS-driven so it honors prefers-reduced-motion.
       Animates transform (compositor-accelerated) instead of the `r`
       attribute, which would force SVG layout on every frame. */
    @keyframes pulse {
      from { transform: scale(1); opacity: 0.5; }
      to   { transform: scale(4); opacity: 0;   }
    }
    .pulse-ring {
      animation: pulse 1.5s linear infinite;
      transform-origin: center;
      transform-box: fill-box;
      will-change: transform, opacity;
    }
    @media (prefers-reduced-motion: reduce) {
      .pulse-ring { animation: none; }
    }
  </style>
</head>
<body>

      <circle class="pulse-ring" r="0.45" fill="#ffffff"/>
